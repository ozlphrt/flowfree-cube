<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>3D FlowFree | Labeled Challenge</title>
    <link rel="icon" type="image/png" href="/flowfree-cube/192.png" />
    <link rel="apple-touch-icon" href="/flowfree-cube/192.png">
    <script type="module" crossorigin src="/flowfree-cube/assets/index-xn-QoQWM.js"></script>
    <link rel="stylesheet" crossorigin href="/flowfree-cube/assets/index-c8_G7iDl.css">
  <link rel="manifest" href="/flowfree-cube/manifest.webmanifest"></head>
  <body>
    <div id="ui-layer">
      <footer id="hud-bottom">
        <div id="hud-bottom-left" class="hud-bottom-container">
            <div id="restart-btn" class="hud-icon-btn pointer-events-auto" title="Restart Level Progress">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
            </div>
        </div>

        <div id="hud-bottom-center" class="hud-bottom-container">
            <div id="compass-btn" class="hud-icon-btn hero-btn pointer-events-auto" title="Reset Orientation">
                <svg id="compass-icon" width="60" height="60" viewBox="0 0 24 24" fill="none" style="transition: transform 0.1s ease-out; transform-origin: center;">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1" opacity="0.2" />
                    <path d="M12 4L15 12L12 13L9 12Z" fill="currentColor" /> <!-- North Half -->
                    <path d="M12 13L15 12L12 20L9 12Z" stroke="currentColor" stroke-width="1.2" fill="none" /> <!-- South Half -->
                </svg>
            </div>
        </div>

        <div id="hud-bottom-right" class="hud-bottom-container">
            <div id="settings-btn" class="hud-icon-btn pointer-events-auto" title="Game Settings">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </div>
        </div>
      </footer>

      <!-- SOVEREIGN HUD: Solve Confirmation Modal -->
      <div id="solve-modal" class="modal hidden">
        <div class="modal-content glass vertical-modal">
            <div class="modal-label">AUTO-SOLVE</div>
            <h2 style="margin: 10px 0; font-size: 1.1rem; letter-spacing: 1px;">USE 1 LIFE?</h2>
            <div class="modal-actions">
                <button id="solve-cancel-btn" class="secondary-btn">LATER</button>
                <button id="solve-confirm-btn" class="primary-btn">YES</button>
            </div>
        </div>
      </div>

      <!-- SOVEREIGN HUD: Top Double-Pill Interface -->
      <header id="sovereign-hud">
        <div class="hud-pill level-pill">
            <span class="pill-label">LEVEL</span>
            <span id="level-val" class="pill-value">1</span>
        </div>
        <div class="hud-pill cells-pill">
            <span class="pill-label">CELLS</span>
            <span id="cells-val" class="pill-value">0</span>
        </div>
        <div id="solve-btn" class="hud-pill wrench-pill clickable" title="Auto Solve (Uses 1 Life)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
            <span id="lives-val" class="pill-value">3</span>
        </div>
      </header>

      <!-- Update Notification Modal (hidden until new SW detected) -->
      <div id="update-banner" class="modal hidden">
        <div class="modal-content glass vertical-modal">
            <div class="victory-icon">↑</div>
            <h2>UPDATE READY</h2>
            <div class="modal-label">New version available</div>
            <div class="modal-actions">
                <button id="dismiss-update-btn" class="secondary-btn">LATER</button>
                <button id="reload-btn" class="primary-btn">RELOAD</button>
            </div>
        </div>
      </div>

      <!-- Long-Press Radial Dial (Hidden) -->
      <div id="long-press-dial" class="hidden">
        <svg width="60" height="60">
          <circle class="bg" cx="30" cy="30" r="24"></circle>
          <circle class="progress" cx="30" cy="30" r="24"></circle>
        </svg>
      </div>

      <!-- Generating... Loader Overlay -->
      <div id="loader-overlay" class="hidden">
        <div class="loader-content glass">
          <div class="sovereign-spinner"></div>
          <div class="loader-text">GENERATING PUZZLE</div>
        </div>
      </div>
    </div>

    <!-- Minimalist Victory Overlay -->
    <div id="victory-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="victory-icon">✓</div>
            <h2>SUCCESS</h2>
            <button id="next-level-btn">NEXT</button>
        </div>
    </div>

    <!-- Custom Level Jump Modal -->
    <div id="level-modal" class="modal hidden">
        <div class="modal-content glass vertical-modal">
            <div class="modal-label">JUMP TO LEVEL</div>
            <input type="number" id="level-input" min="1" max="999" value="1">
            <div class="modal-actions">
                <button id="level-cancel-btn" class="secondary-btn">CANCEL</button>
                <button id="level-jump-btn" class="primary-btn">GO</button>
            </div>
        </div>
    </div>

    <!-- Custom Version Modal -->
    <div id="version-modal" class="modal hidden">
        <div class="modal-content glass vertical-modal">
            <div class="modal-label">SOVEREIGN CUBE</div>
            <div class="version-details">
                <div class="v-row"><span>VERSION</span> <strong id="v-num">v1.186.2</strong></div>
                <div class="v-row"><span>BUILD</span> <code id="v-commit">8f2a91b</code></div>
                <div class="v-row"><span>DATE</span> <span id="v-date">2026-04-02</span></div>
            </div>
            <div class="modal-actions">
                <button id="v-copy-btn" class="secondary-btn">COPY INFO</button>
                <button id="v-close-btn" class="primary-btn">DONE</button>
            </div>
        </div>
    </div>

    <!-- UI: Settings System -->
    <button id="settings-btn" aria-label="Settings">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>

    <div id="settings-panel" class="modal-content glass hidden">
        <div class="settings-group toggle-group" id="audio-icon-btn" title="Toggle Audio">
            <span class="settings-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path class="audio-on" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path class="audio-on" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><line class="audio-off hidden" x1="1" y1="1" x2="23" y2="23"></line></svg>
            </span>
        </div>

        <div class="settings-group toggle-group" id="theme-icon-btn" title="Toggle Theme">
            <span class="settings-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path class="theme-moon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    <circle class="theme-sun hidden" cx="12" cy="12" r="5"></circle>
                    <line class="theme-sun hidden" x1="12" y1="1" x2="12" y2="3"></line>
                    <line class="theme-sun hidden" x1="12" y1="21" x2="12" y2="23"></line>
                    <line class="theme-sun hidden" x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line class="theme-sun hidden" x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line class="theme-sun hidden" x1="1" y1="12" x2="3" y2="12"></line>
                    <line class="theme-sun hidden" x1="21" y1="12" x2="23" y2="12"></line>
                    <line class="theme-sun hidden" x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line class="theme-sun hidden" x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </span>
        </div>

        <div class="settings-group toggle-group" id="lvl-btn" title="Jump to Level">
            <span class="settings-icon lvl-icon">
                LVL
            </span>
        </div>

        <div class="settings-group toggle-group" id="refill-btn" title="Refill Wrench Lives">
            <span class="settings-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                </svg>
            </span>
        </div>

        <div class="settings-group toggle-group" id="version-btn" title="App Information">
            <span class="settings-icon version-icon">
                VER
            </span>
        </div>
    </div>

  </body>
</html>
