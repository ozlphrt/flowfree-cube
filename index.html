<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>3D FlowFree | Labeled Challenge</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script type="module" crossorigin src="/flowfree-cube/assets/index-Pco2iUY6.js"></script>
    <link rel="stylesheet" crossorigin href="/flowfree-cube/assets/index-Cuh8p7Ky.css">
  </head>
  <body>
    <!-- 3D Canvas will be injected here by Three.js -->
    
    <div id="ui-layer">
      <!-- HUD Top: Progress Information -->
      <header class="hud-header">
        <div id="hud-top">
      <div class="hud-item" id="pipes-box">
        <span class="hud-label">PUZZLE</span>
        <span class="hud-value" id="pipes-count">0 / 0</span>
      </div>
    </div>
      </header>

      <!-- HUD Bottom: Controls -->
      <div class="hud-footer">
      </div>

      <!-- Update Notification (Hidden) -->
      <div id="update-banner" class="hidden">
        <span class="update-text">NEW VERSION READY</span>
        <button id="reload-btn">RELOAD</button>
      </div>

      <!-- Long-Press Radial Dial (Hidden) -->
      <div id="long-press-dial" class="hidden">
        <svg width="60" height="60">
          <circle class="bg" cx="30" cy="30" r="24"></circle>
          <circle class="progress" cx="30" cy="30" r="24"></circle>
        </svg>
      </div>
    </div>

    <!-- Minimalist Victory Overlay -->
    <div id="victory-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="victory-icon">✓</div>
            <h2>SUCCESS</h2>
            <button id="next-level-btn">NEXT</button>
        </div>
    </div>

    <!-- Settings (Already implemented) -->
    <div id="settings-container">
        <button id="settings-btn">⚙️</button>
        <div id="settings-panel" class="hidden">
          <h3>Settings</h3>
          <div class="setting-item">
            <label>Rotation Sensitivity: <span id="sensitivity-val">1.0</span></label>
            <input type="range" id="sensitivity-slider" min="0.1" max="3.0" step="0.1" value="1.0">
          </div>
          <button id="close-settings">Done</button>
        </div>
    </div>

  </body>
</html>
